name: 抓取当日用餐人数并推送到企业微信（Playwright版）

on:
  schedule:
    - cron: '15 1 * * *'          # UTC 01:15 = 北京时间 09:15
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4

      # 设置 Python 并缓存依赖
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 安装依赖（从 requirements.txt）
      - name: 安装依赖
        run: pip install -r requirements.txt

      # 缓存 Playwright 浏览器
      - name: 缓存 Playwright 浏览器
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: 安装 Playwright 浏览器
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: 抓取并推送
        env:
          WECOM_WEBHOOK_KEY: ${{ secrets.WECOM_WEBHOOK_KEY }}
          LUNCH_URL: ${{ secrets.LUNCH_URL }}
        run: python scripts/fetch_lunch_stats.py
