name: 抓取当日用餐人数并推送到企业微信（Playwright版）

on:
  schedule:
    - cron: '15 1 * * *'          # UTC 01:15 = 北京时间 09:15（避开整点）
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10            # 整体超时控制
    
    steps:
      - uses: actions/checkout@v4

      # 设置 Python（无缓存）
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Python 依赖
        run: |
          pip install playwright beautifulsoup4 lxml requests
          playwright install chromium --with-deps

      - name: 抓取并推送
        env:
          WECOM_WEBHOOK_KEY: ${{ secrets.WECOM_WEBHOOK_KEY }}
          LUNCH_URL: ${{ secrets.LUNCH_URL }}
        run: |
          import os, json, requests, sys
          from playwright.sync_api import sync_playwright
          from bs4 import BeautifulSoup

          key     = os.getenv('WECOM_WEBHOOK_KEY')
          url     = os.getenv('LUNCH_URL')
          webhook = f"https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key={key}"

          with sync_playwright() as p:
              browser = p.chromium.launch(
                  headless=True,
                  args=[
                      '--no-sandbox',
                      '--disable-setuid-sandbox',
                      '--disable-dev-shm-usage',
                      '--disable-accelerated-2d-canvas',
                      '--disable-gpu',
                      '--window-size=1920,1080',
                  ]
              )
              context = browser.new_context(
                  viewport={'width': 1920, 'height': 1080},
                  user_agent='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.0'
              )
              page = context.new_page()
              
              try:
                  page.goto(url, wait_until="domcontentloaded", timeout=30000)
                  page.wait_for_selector('div.stats-box', timeout=10000)
                  page.wait_for_load_state('networkidle', timeout=10000)
                  html = page.content()
              except Exception as e:
                  print('❌ 打开页面失败:', e)
                  sys.exit(1)
              finally:
                  context.close()
                  browser.close()

          soup = BeautifulSoup(html, "lxml")
          box  = soup.select_one('div.stats-box')
          if not box:
              print('⚠️  页面中找不到 div.stats-box，前 1000 字符：')
              print(html[:1000])
              sys.exit(1)

          num   = box.find('div')
          title = box.find('h3')
          if not num or not title:
              print('⚠️  stats-box 内缺少 div 或 h3')
              sys.exit(1)

          # 修复：使用单行字符串拼接，避免 YAML 多行格式问题
          title_text = title.get_text(strip=True)
          num_text = num.get_text(strip=True)
          md = "## 🍽️ 今日用餐统计\n\n> **" + title_text + "**\n> \n> 👥 **" + num_text + "** 人\n\n⏰ 更新时间：北京时间 08:00"

          payload = {"msgtype": "markdown", "markdown": {"content": md}}

          try:
              resp = requests.post(webhook, json=payload, timeout=10)
              resp.raise_for_status()
              result = resp.json()
              if result.get('errcode') == 0:
                  print('✅ 推送成功:', resp.text)
              else:
                  print('❌ 推送失败:', result)
                  sys.exit(1)
          except Exception as e:
              print('❌ 推送失败:', e)
              sys.exit(1)
