name: 抓取当日用餐人数并推送到企业微信（Playwright版）

on:
  schedule:
    - cron: '15 1 * * *'          # UTC 01:15 = 北京时间 09:15（避开整点）
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10            # 整体超时控制
    
    steps:
      - uses: actions/checkout@v4

      # 优化1: 使用缓存加速依赖安装
      - name: 设置 Python 缓存
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装 Python 依赖
        run: |
          pip install playwright beautifulsoup4 lxml requests
          # 优化2: 只安装 chromium，跳过依赖检查加速
          playwright install chromium --with-deps

      # 优化3: 缓存 Playwright 浏览器
      - name: 缓存 Playwright 浏览器
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
        # 如果缓存命中，跳过浏览器安装
          
      - name: 安装 Playwright 浏览器（如未缓存）
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      # 优化4: 分离脚本便于维护，并增加错误处理
      - name: 抓取并推送
        env:
          WECOM_WEBHOOK_KEY: ${{ secrets.WECOM_WEBHOOK_KEY }}
          LUNCH_URL: ${{ secrets.LUNCH_URL }}
        run: python scripts/fetch_lunch_stats.py
